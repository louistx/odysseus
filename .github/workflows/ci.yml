name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Lint service scripts
        run: bash -n install-service.sh docker/entrypoint.sh

      - name: Initialize local app state
        env:
          ODYSSEUS_ADMIN_PASSWORD: ci-admin-password
        run: python setup.py

      - name: Run tests
        run: python -m pytest -q

      - name: Smoke import ASGI app
        run: python -c "from app import app; print(app.title)"

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Validate Compose file
        run: |
          cp .env.example .env
          docker compose config --quiet
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: odysseus:ci
